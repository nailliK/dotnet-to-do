services:
  todos:
    image: todos
    build:
      context: .
      dockerfile: ToDos/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Key=DockerDevKeyThatIsAtLeast32Characters!

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://todos:8080
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://todos:8080
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=change-me-in-production
    depends_on:
      - todos
